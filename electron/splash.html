<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChurchDisplay Pro</title>
  <style>
    :root {
      --bg-1: #060816;
      --bg-2: #101a36;
      --accent: #4cc9f0;
      --accent-2: #f72585;
      --text: #f5f7ff;
      --muted: #9fb0d0;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", "Noto Sans SC", sans-serif;
      overflow: hidden;
      background: transparent;
    }
    .stage {
      width: 100%;
      height: 100%;
      border-radius: 18px;
      position: relative;
      background:
        radial-gradient(1200px 600px at 15% -10%, rgba(76,201,240,0.25), transparent 60%),
        radial-gradient(900px 500px at 85% 110%, rgba(247,37,133,0.22), transparent 65%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 18px 50px rgba(0,0,0,0.45);
      display: grid;
      place-items: center;
    }
    .glow {
      position: absolute;
      inset: 0;
      background: conic-gradient(from 0deg, rgba(76,201,240,0.0), rgba(76,201,240,0.16), rgba(247,37,133,0.18), rgba(76,201,240,0.0));
      filter: blur(28px);
      animation: spin 3.2s linear infinite;
      transform-origin: center;
    }
    .content {
      position: relative;
      text-align: center;
      animation: rise 700ms ease-out;
      z-index: 2;
    }
    .logo {
      display: inline-grid;
      place-items: center;
      width: 92px;
      height: 92px;
      border-radius: 24px;
      margin-bottom: 16px;
      color: #fff;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(145deg, rgba(76,201,240,0.95), rgba(88,120,255,0.9));
      box-shadow: 0 10px 28px rgba(76,201,240,0.28);
      font-size: 34px;
    }
    .title {
      color: var(--text);
      font-size: 34px;
      font-weight: 760;
      letter-spacing: 0.3px;
      margin: 0;
    }
    .subtitle {
      color: var(--muted);
      margin-top: 8px;
      font-size: 13px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    .bar {
      margin: 18px auto 0;
      width: 320px;
      height: 6px;
      border-radius: 99px;
      background: rgba(255,255,255,0.12);
      overflow: hidden;
    }
    .bar::before {
      content: "";
      display: block;
      width: 38%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      animation: loading 1.25s ease-in-out infinite;
    }
    .footer {
      position: absolute;
      bottom: 18px;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      letter-spacing: 0.4px;
      z-index: 2;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes loading {
      0% { transform: translateX(-120%); }
      50% { transform: translateX(130%); }
      100% { transform: translateX(300%); }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="glow" aria-hidden="true"></div>
    <div class="content">
      <div class="logo">CD</div>
      <h1 class="title">ChurchDisplay Pro</h1>
      <div class="subtitle">Preparing your worship session</div>
      <div class="bar" aria-hidden="true"></div>
    </div>
    <div class="footer">God bless us</div>
  </div>
</body>
</html>
